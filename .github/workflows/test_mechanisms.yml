name: Test Mechanisms with MusicBox

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MusicBox
        run: |
          pip install git+https://github.com/NCAR/music-box.git

      - name: Run Mechanism Tests
        run: |
          python3 scripts/test_mechanisms.py
